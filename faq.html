    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5c5c5c;
            --text-tertiary: #8a8a8a;
            --accent: #c74a2f;
            --accent-hover: #a83a24;
            --border: #e8e4dd;
            --border-light: #f0ede6;
            --shadow-sm: 0 1px 3px rgba(26, 26, 26, 0.04);
            --shadow-md: 0 4px 16px rgba(26, 26, 26, 0.06);
            --shadow-lg: 0 12px 40px rgba(26, 26, 26, 0.09);
            --radius-sm: 6px;
            --radius: 12px;
            --radius-lg: 20px;
            --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--bg);
        }
        body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            background-color: var(--bg);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            letter-spacing: -0.01em;
        }
        .container {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 250, 248, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-light);
            transition: var(--transition);
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 62px;
            padding: 0 24px;
            max-width: 1080px;
            margin: 0 auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
            white-space: nowrap;
        }
        .logo span {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.92rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            transition: var(--transition);
            position: relative;
            padding: 4px 0;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: var(--transition);
        }
        .nav-links a:hover,
        .nav-links a:focus {
            color: var(--text-primary);
        }
        .nav-links a:hover::after,
        .nav-links a:focus::after {
            width: 100%;
        }
        .btn-tel {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: -0.01em;
            transition: var(--transition);
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(199, 74, 47, 0.18);
        }
        .btn-tel:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 18px rgba(199, 74, 47, 0.28);
            transform: translateY(-1px);
        }
        .hamburger-menu {
            display: none;
        }
        main {
            flex: 1;
            padding: 48px 0 80px;
        }
        .page-header {
            text-align: center;
            padding: 40px 20px 52px;
        }
        .page-header .section-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            background: rgba(199, 74, 47, 0.06);
            padding: 5px 14px;
            border-radius: 50px;
            margin-bottom: 16px;
        }
        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.15;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .page-header .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 560px;
            margin: 0 auto;
            line-height: 1.55;
        }
        .faq-section {
            max-width: 760px;
            margin: 0 auto 64px;
            padding: 0 20px;
        }
        .faq-item {
            border-bottom: 1px solid var(--border);
            padding: 0;
            transition: var(--transition);
        }
        .faq-item:first-child {
            border-top: 1px solid var(--border);
        }
        .faq-question {
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            font-family: var(--font-sans);
            font-size: 1.06rem;
            font-weight: 700;
            color: var(--text-primary);
            padding: 22px 40px 22px 0;
            cursor: pointer;
            position: relative;
            letter-spacing: -0.02em;
            line-height: 1.4;
            transition: var(--transition);
        }
        .faq-question:hover {
            color: var(--accent);
        }
        .faq-question::after {
            content: '+';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text-tertiary);
            transition: var(--transition);
        }
        .faq-item.open .faq-question::after {
            content: '−';
            color: var(--accent);
        }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 0 0 0;
        }
        .faq-item.open .faq-answer {
            max-height: 600px;
            padding: 0 0 24px 0;
        }
        .faq-answer-inner {
            font-size: 0.96rem;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: -0.01em;
            padding-right: 24px;
        }
        .faq-answer-inner strong {
            color: var(--text-primary);
            font-weight: 700;
        }
        .faq-answer-inner .highlight {
            color: var(--accent);
            font-weight: 700;
        }
        .cta-block {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
        }
        .cta-block h2 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .cta-block p {
            font-size: 0.96rem;
            color: var(--text-secondary);
            margin-bottom: 22px;
            line-height: 1.55;
        }
        .cta-block .btn-tel-large {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 1.08rem;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: -0.01em;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(199, 74, 47, 0.22);
        }
        .cta-block .btn-tel-large:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 26px rgba(199, 74, 47, 0.34);
            transform: translateY(-2px);
        }
        .cta-block .tel-number {
            display: block;
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            margin-top: 4px;
        }
        footer {
            border-top: 1px solid var(--border-light);
            padding: 28px 24px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            letter-spacing: 0.01em;
        }
        footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        footer a:hover {
            color: var(--accent);
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger-menu {
                display: block;
            }
            .page-header h1 {
                font-size: 2rem;
            }
            .page-header .subtitle {
                font-size: 0.96rem;
            }
            .faq-question {
                font-size: 0.96rem;
                padding: 18px 36px 18px 0;
            }
            .cta-block {
                padding: 28px 20px;
                border-radius: var(--radius);
            }
            .cta-block h2 {
                font-size: 1.35rem;
            }
        }
        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.6rem;
            }
            .btn-tel {
                font-size: 0.78rem;
                padding: 8px 14px;
            }
            .logo {
                font-size: 1rem;
            }
        }
    </style>
</head>
