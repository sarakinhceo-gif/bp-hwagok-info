            --color-muted: #5C5C5C;

            --color-card: #FFFFFF;
            --color-subtle: #F0EBE1;

            }

        }
        .logo span {
            color: var(--color-accent);
        }
        .nav-links {
            display: flex;

            gap: calc(var(--spacing-unit) * 3);
            list-style: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            transition: color 0.2s ease;
            white-space: nowrap;
        }
        .nav-links a:hover,

                z-index: 105;

            .nav-links.nav-present {
                right: 0;
            }
            .hamburger-menu {
                display: flex;
            }
        }

            background: var(--color-subtle);
            aspect-ratio: 16/9;
            position: relative;
        }

            text-align: center;

            color: var(--color-text);

        }
        .map-placeholder a:hover {

        }

        }

            border-bottom: none;
        }
        .hours-item .day {
            font-weight: 600;
            min-width: 70px;
        }

            color: var(--color-accent);
            font-weight: 700;
